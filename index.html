<html>

<head>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #imagecache {
            position: absolute;
            display: none;
            background: #000000;
            height: 100%;
            width: 100%;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
        }
        #slideshow {
            position: absolute;
            display: block;
            background: #000000;
            height: 100%;
            width: 100%;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
        }
        #authorize-button {
            position: absolute;
            display: block;
            z-index: 80000;
            width: 200px;
            height: 60px;
        }
        /* #error {
            background-image: url("https://static-cdn.jtvnw.net/emoticons/v1/1377826/3.0");
        } */
    </style>
</head>

<body>
    <button id="authorize-button">Authorize</button>
    <div id="imagecache"></div>
    <div id="slideshow"></div>
    <script>
        "use strict";

        const clientId = '397409082404-fbcnah9mbf7smeki79eomkij01i54rph.apps.googleusercontent.com';
        const albumId = getQueryVariable('albumId', 'ANvUp4rtRfRK8mYJHaogduWXpe2jRkip_hX14xMqjgbBTr63lgV0m-g');
        const maxWidth = parseInt(getQueryVariable('maxWidth', '2560'));
        const maxHeight = parseInt(getQueryVariable('maxHeight', '1440'));
        const slideshowTimeMs = parseInt(getQueryVariable('slideshowTime', '5000'));
        const cacheTimeSeconds = parseInt(getQueryVariable('cacheTimeSeconds', '60'));

        var photos = [];
        var currentPhoto = 0;

        function getQueryVariable(variable, defaultValue) {
            let query = window.location.search.substring(1);
            let vars = query.split('&');
            for (let i = 0; i < vars.length; i++) {
                let pair = vars[i].split('=');
                if (decodeURIComponent(pair[0]) == variable) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return defaultValue;
        }

        function setTTLCache(key, value) {
            const object = {
                value: value,
                timestamp: new Date().getTime(),
            }
            localStorage.setItem(key, JSON.stringify(object));
        }

        function getTTLCache(key, ttlSeconds) {
            const rawObject = localStorage.getItem(key);
            if (rawObject === null) {
                return null;
            }
            const object = JSON.parse(rawObject);
            if (typeof ttlSeconds !== 'undefined') {
                const now = new Date().getTime();
                if (now > object.timestamp + ttlSeconds * 1000) {
                    return null;
                }
            }
            return object.value;
        }

        function showError(message) {
            console.error(message);
            // TODO: do something!
        }

        function doRequest() {
            return gapi.client.photoslibrary.mediaItems.search({
                albumId: albumId,
                pageSize: 100,
            }).then(function (resp) {
                resp.result.mediaItems.forEach(function (item) {
                    photos.push(item.baseUrl + '=w2560-h1440');
                });
                console.log('Number of photos:', photos.length);
                slideshow();
            }, function (reason) {
                console.log('ERROR:', reason);
            });
        }

        function updateSigninStatus(isSignedIn) {
            if (isSignedIn) {
                doRequest();
            } else {
                authorizeButton.style.display = 'block';
            }
        }

        function handleAuthClick(event) {
            gapi.auth2.getAuthInstance().signIn();
        }

        var authorizeButton = document.getElementById('authorize-button');

        function getPhotos() {
            const cache = getTTLCache('getPhotoURLs-' + albumId, cacheTimeSeconds);
            let result = null;
            if (cache) {
                console.info('getPhotoURLs cached result:', cache);
                result = cache;
            } else {
                console.log('gapi.client.init');
                gapi.client.init({
                    clientId: clientId,
                    scope: 'https://www.googleapis.com/auth/photoslibrary.readonly',
                    discoveryDocs: ['https://photoslibrary.googleapis.com/$discovery/rest?version=v1'],
                }).then(function () {
                    // Listen for sign-in state changes.
                    gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);

                    // Handle the initial sign-in state.
                    updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
                    authorizeButton.onclick = handleAuthClick;
                }, function (reason) {
                    showError(reason);
                });
            }
            return result;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                let temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function slideshowStep() {
            // Set new photo
            if (photos.length <= currentPhoto) {
                currentPhoto = 0;
            }
            currentPhoto += 1;
            document.getElementById('slideshow').style.backgroundImage = 'url("' + photos[currentPhoto] + '")';

            // Preload next photo
            let nextPhoto = currentPhoto + 1;
            if (photos.length <= nextPhoto) {
                nextPhoto = 0;
            }
            document.getElementById('imagecache').style.backgroundImage = 'url("' + photos[nextPhoto] + '")';

            setTimeout(slideshowStep, slideshowTimeMs);
        }

        function slideshow() {
            if (photos.length == 0) {
                showError('No photos found');
                return;
            }
            shuffleArray(photos);
            slideshowStep();
        }

        function handleClientLoad() {
            gapi.load('client:auth2', getPhotos);
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js"
        onload="this.onload=function(){};handleClientLoad()"
        onreadystatechange="if (this.readyState === 'complete') this.onload()">
    </script>
</body>

</html>
