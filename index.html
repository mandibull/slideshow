<html>

<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }
        .slideshow {
            position: absolute;
            display: block;
            background: #000000;
            height: 100%;
            width: 100%;
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
        }
        #prefetch {
            display: none;
        }
        #error {
            display: none;
            color: white;
            font-size: 25px;
            text-align: left;
            position: absolute;
            max-width: 1000px;
            min-height: 150px;
            background-image: url("https://static-cdn.jtvnw.net/emoticons/v1/1339393/3.0");
            background-repeat: no-repeat;
            background-position: 15 18;
            padding: 10px 30px 10px 155px;
            position: fixed;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);

        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        "use strict";
    
        function displayError(message) {
            $('#error').css('display', 'block').text('ERROR: ' + message);
            console.error(message);
        }

        function getQueryVariable(variable, defaultValue) {
            let query = window.location.search.substring(1);
            let vars = query.split('&');
            for (let i = 0; i < vars.length; i++) {
                let pair = vars[i].split('=');
                if (decodeURIComponent(pair[0]) == variable) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return defaultValue;
        }

        function setTTLCache(key, value) {
            const object = {
                value: value,
                timestamp: new Date().getTime(),
            }
            localStorage.setItem(key, JSON.stringify(object));
        }

        function getTTLCache(key, ttlSeconds) {
            const rawObject = localStorage.getItem(key);
            if (rawObject === null) {
                return null;
            }
            const object = JSON.parse(rawObject);
            if (typeof ttlSeconds !== 'undefined') {
                const now = new Date().getTime();
                if (now > object.timestamp + ttlSeconds * 1000) {
                    return null;
                }
            }
            return object.value;
        }

        function getAlbumPhotoURLs(clientId, albumHash, albumCacheTimeSeconds) {
            const cache = getTTLCache('getAlbumPhotoURLs-' + albumHash, albumCacheTimeSeconds);
            if (cache) {
                console.info('getAlbumPhotoURLs cached result:', cache);
                photos = cache;
                startSlideshow();
            } else {
                $.ajax({
                    url: 'https://api.imgur.com/3/album/' + albumHash + '/images',
                    beforeSend: function (jqXHR, settings) {
                        jqXHR.setRequestHeader('Authorization', 'Client-ID ' + clientId);
                    },
                    success: function(result) {
                        photos = [];
                        result.data.forEach(function(item) {
                            photos.push(item.link);
                        });
                        console.info('getAlbumPhotoURLs result:', photos);
                        setTTLCache('getAlbumPhotoURLs-' + albumHash, photos);
                        startSlideshow();
                    },
                    error: function(xhr, status, error) {
                        if (xhr.status == 404) {
                            error = 'not found';
                        }
                        displayError('failed to retrieve albumHash ' + albumHash + ': ' + error);
                    },
                });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                let temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        const clientId = getQueryVariable('apiKey', 'de79b36c22915ea');
        const albumHash = getQueryVariable('albumHash', '');
        const albumCacheTimeSeconds = parseInt(getQueryVariable('albumCacheTimeSeconds', '60'));
        const slideshowTimeSeconds = parseInt(getQueryVariable('slideshowTimeSeconds', '10'));

        var photos = [];
        var currentPhotoIndex = 0;

        function slideshowStep() {
            if (photos.length <= currentPhotoIndex) {
                currentPhotoIndex = 0;
            }
            $('#slideshow').css('background-image', 'url("' + photos[currentPhotoIndex] + '")');
            currentPhotoIndex += 1;

            let nextPhotoIndex = currentPhotoIndex;
            if (photos.length <= nextPhotoIndex) {
                nextPhotoIndex = 0;
            }
            $('#prefetch').css('background-image', 'url("' + photos[nextPhotoIndex] + '")');
            setTimeout(slideshowStep, slideshowTimeSeconds * 1000);
        }

        function startSlideshow() {
            if (photos.length == 0) {
                displayError('Album is empty');
                return;
            }
            shuffleArray(photos);
            slideshowStep();
        }

        $(function() {
            getAlbumPhotoURLs(clientId, albumHash, albumCacheTimeSeconds);
        });
    </script>
</head>

<body>
    <div id="slideshow" class="slideshow"></div>
    <div id="prefetch" class="slideshow"></div>
    <div id="error"></div>
</body>

</html>
